<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodLoop - Cadastrar Alimento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">FoodLoop</div>
        <nav>
            <a href="index.html">Voltar para início</a>
        </nav>
    </header>

    <main>
        <section class="cadastro">
            <h2>Cadastrar Alimento para Doação</h2>
            <form id="form-alimento">
                <label for="nome-alimento">Nome do Alimento</label>
                <input type="text" id="nome-alimento" name="nome-alimento" required>

                <label for="doador-alimento">Seu nome / estabelecimento</label>
                <input type="text" id="doador-alimento" name="doador-alimento" required>

                <label for="local-alimento">Local (cidade/região)</label>
                <input type="text" id="local-alimento" name="local-alimento" required>

                <label for="validade-alimento">Data de validade</label>
                <input type="date" id="validade-alimento" name="validade-alimento" required>

                <button type="submit">Cadastrar Alimento</button>
            </form>
            <div id="mensagem-alimento"></div>
        </section>
    </main>

    <footer>
        <p>FoodLoop - Reduzindo o desperdício de alimentos &copy; 2025</p>
    </footer>

    <script src="script.js"></script>
    <script>
        document.getElementById('form-alimento').addEventListener('submit', function(e) {
            e.preventDefault();

            const nome = document.getElementById('nome-alimento').value;
            const doador = document.getElementById('doador-alimento').value;
            const local = document.getElementById('local-alimento').value;
            const validade = document.getElementById('validade-alimento').value;

            // Cria objeto do alimento
            const novoAlimento = {
                id: Date.now(),
                nome: nome,
                doador: doador,
                local: local,
                validade: validade,
                imagem: 'https://via.placeholder.com/300x150?text=Alimento'
            };

            // Recupera lista atual de alimentos cadastrados
            let alimentosCadastrados = JSON.parse(localStorage.getItem('foodloop_alimentos')) || [];
            alimentosCadastrados.push(novoAlimento);
            localStorage.setItem('foodloop_alimentos', JSON.stringify(alimentosCadastrados));

            // Redireciona para a página inicial
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
